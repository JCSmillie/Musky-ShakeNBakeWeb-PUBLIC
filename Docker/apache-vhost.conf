<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /opt/musky/web

    <Directory /opt/musky/web>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
